name: 📐 Atualizar membros no README

on:
  push:
    paths:
      - "08.Instrucoes.txt"
  workflow_dispatch:

jobs:
  update-members:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Atualizar tabela de membros no README
        run: python3 scripts/update_members.py

      - name: Commit README atualizado
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: atualiza membros no README a partir do 08.Instrucoes.txt [skip ci]"
          file_pattern: "README.md"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
