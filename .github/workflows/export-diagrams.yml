name: 📐 Export draw.io → PNG

on:
  push:
    paths:
      - "diagramas/*.drawio"
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (histórico completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Export draw.io → PNG (fundo branco)
        uses: rlespinasse/drawio-export-action@v2
        with:
          path: diagramas
          format: png
          output: exports
          remove-page-suffix: true
          transparent: false

      - name: Commit PNGs gerados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: auto-export drawio → PNG fundo branco [skip ci]"
          file_pattern: "diagramas/exports/*.png"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
