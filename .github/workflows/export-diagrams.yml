name: 📐 Atualizar membros no README

on:
  push:
    paths:
      - "08.Instrucoes.txt"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-members:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python3 scripts/update_members.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: atualiza membros no README a partir do 08.Instrucoes.txt [skip ci]"
          file_pattern: "README.md"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
