name: 📐 CI — Diagramas + Membros

on:
  push:
    paths:
      - "08.Instrucoes.txt"
  workflow_dispatch:

jobs:
  export-diagrams:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: rlespinasse/drawio-export-action@v2
        with:
          path: diagramas
          format: png
          output: exports
          remove-page-suffix: true
          transparent: false
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: auto-export drawio → PNG fundo branco [skip ci]"
          file_pattern: "diagramas/exports/*.png"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

  update-members:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python3 scripts/update_members.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: atualiza membros no README a partir do 08.Instrucoes.txt [skip ci]"
          file_pattern: "README.md"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
